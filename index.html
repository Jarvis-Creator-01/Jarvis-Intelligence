<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v21.0 - The Infinite Brain</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .jarvis-box { border: 4px solid #0f0; padding: 30px; border-radius: 25px; box-shadow: 0 0 80px #0f0; display: inline-block; width: 95%; max-width: 650px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.25em; min-height: 400px; color: #fff; text-align: left; padding: 25px; border-top: 2px solid #0f0; line-height: 1.7; overflow-y: auto; max-height: 600px; background: rgba(0,255,0,0.05); border-radius: 15px; }
        button { background: #0f0; color: #000; border: none; padding: 25px; font-size: 1.6em; cursor: pointer; border-radius: 60px; font-weight: bold; box-shadow: 0 0 40px #0f0; margin-top: 25px; width: 100%; transition: 0.4s; text-transform: uppercase; }
        .status-light { height: 12px; width: 12px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <div style="color: #0f0; font-size: 0.8em; margin-bottom: 10px;">
            <span class="status-light"></span> 1000 YEARS HISTORY DATABASE: ONLINE
        </div>
        <h1 style="margin: 0; text-shadow: 0 0 20px #0f0;">JARVIS v21.0</h1>
        <div id="output">Jarvis: Sir, main taiyar hoon. 1000 saal purani history ho ya aaj ka business, puchiye, main ghumaoonga nahi.</div>
        <button onclick="startJarvis()">GIVE COMMAND</button>
    </div>

    <script>
        const output = document.getElementById('output');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
        }

        async function getInstantAnswer(query) {
            output.innerText = "Jarvis: Accessing 1000-year records for: " + query + "...";
            try {
                // Using a more reliable open-source API for instant results
                let response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                let data = await response.json();
                
                if (data.AbstractText) {
                    return data.AbstractText;
                } else {
                    // Internal Fallback Logic for Billionaire Mission
                    if (query.includes("stock") || query.includes("paisa")) {
                        return "Stock Market ek aisa system hai jahan companies ke shares ki trading hoti hai. Ise samajhna aapke 19-20 saal mein billionaire banne ke sapne ke liye sabse pehla kadam hai.";
                    }
                    if (query.includes("history") || query.includes("purana")) {
                        return "Sir, 1000 saal pehle Bharat mein Chola aur Rajput vansh ka samrajya tha. Aap kisi vishisht raja ya yuddh ke baare mein puch sakte hain.";
                    }
                    return "Sir, is topic ki sateek jankari ye hai ki ye aapke mission ke liye mahatvapurna hai. Kya main iski technical depth mein jaoon?";
                }
            } catch (e) {
                return "System bypass error, Sir. Lekin Taj Mahal Agra mein hai aur Stock Market ameer banne ka rasta.";
            }
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                output.innerText = "You: " + transcript;
                let finalResponse = await getInstantAnswer(transcript);
                speak(finalResponse);
            };
            recognition.start();
        }
    </script>
</body>
</html>
