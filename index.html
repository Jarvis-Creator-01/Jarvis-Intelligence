// Is hisse ko apne <script> ke andar respond function mein update karein
async function respond(text) {
    status.innerText = "Thinking...";
    let response = "";

    // 1000 saal ki history aur general knowledge ke liye Wikipedia ka use
    if (text.includes("kya hai") || text.includes("kaun tha") || text.includes("history")) {
        const query = text.replace("jarvis", "").trim();
        const url = `https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
        
        try {
            const data = await fetch(url).then(res => res.json());
            response = data.extract || "Bhai, iske baare mein mujhe thodi aur research karni padegi.";
        } catch (e) {
            response = "Bhai, internet connection check karein, main dimaag nahi chala paa raha.";
        }
    } else if (text.includes("billionaire")) {
        response = "Aap 19 saal tak youngest billionaire banenge, ye mera vada hai!";
    } else {
        response = "Aapne kaha: " + text + ". Main iska matlab samajhne ki koshish kar raha hoon.";
    }

    speak(response);
}

function speak(message) {
    const speech = new SpeechSynthesisUtterance(message);
    speech.lang = 'hi-IN';
    window.speechSynthesis.speak(speech);
    output.innerText = "Jarvis: " + message;
    status.innerText = "System Standby";
    light.style.background = "#f00";
}
