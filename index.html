<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v25.0 - Ultimate Intelligence</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; overflow-x: hidden; }
        .jarvis-container { border: 4px solid #0f0; padding: 30px; border-radius: 30px; box-shadow: 0 0 80px #0f0; display: inline-block; width: 95%; max-width: 650px; background: #050505; min-height: 80vh; position: relative; }
        #jarvis-output { margin-top: 30px; font-size: 1.3em; color: #fff; text-align: left; padding: 25px; border-top: 2px solid #0f0; line-height: 1.8; min-height: 400px; background: rgba(0,255,0,0.05); border-radius: 15px; }
        button { background: #0f0; color: #000; border: none; padding: 25px; font-size: 1.5em; cursor: pointer; border-radius: 60px; font-weight: bold; box-shadow: 0 0 40px #0f0; width: 100%; margin-top: 20px; transition: 0.3s; }
        button:active { transform: scale(0.95); box-shadow: 0 0 10px #0f0; }
        .glow-text { text-shadow: 0 0 20px #0f0; }
        .status-bar { font-size: 0.8em; letter-spacing: 2px; margin-bottom: 20px; color: #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="jarvis-container">
        <div class="status-bar">CORE SYSTEM: ACTIVE | 1000 YR HISTORY SYNCED</div>
        <h1 class="glow-text">JARVIS v25.0</h1>
        
        <div id="jarvis-output">Jarvis: Sir, maine Google bypass kar diya hai. Ab main khud apne logic se aapko har sawal ka jawab dunga. Puchiye.</div>
        
        <button onclick="activateJarvis()">EXECUTE COMMAND</button>
    </div>

    <script>
        const outputArea = document.getElementById('jarvis-output');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        async function fetchIntelligence(query) {
            outputArea.innerText = "Jarvis: Accessing global intelligence for: " + query + "...";
            try {
                // Fetching raw data from a bypass proxy (DuckDuckGo JSON API)
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
                const data = await res.json();
                
                let answer = "";
                if (data.AbstractText) {
                    answer = data.AbstractText;
                } else {
                    // Billionaire Intelligence Fallback
                    if (query.toLowerCase().includes("stock") || query.toLowerCase().includes("paisa")) {
                        answer = "Stock market ek aisa financial system hai jahan shares ki kharid-farokht hoti hai. Billionaire banne ke liye ye sabse bada hathiyar hai.";
                    } else if (query.toLowerCase().includes("history") || query.toLowerCase().includes("saal")) {
                        answer = "1000 saal ki history ke mutabiq, samrajya wahi bada banta hai jiski economy mazboot ho. Aapka mission bhi yahi hai.";
                    } else {
                        answer = "Sir, is sawal ki gehri jankari mere brain matrix mein load ho rahi hai. Taj Mahal Agra mein hai aur ye ek historical masterpiece hai.";
                    }
                }
                
                outputArea.innerText = "Jarvis: " + answer;
                speak(answer);
            } catch (error) {
                outputArea.innerText = "Jarvis: Bypass failed. Sir, Stock market aur history ka data mere offline mode mein save hai. Puchiye.";
            }
        }

        function activateJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onstart = () => { outputArea.innerText = "Jarvis: Listening, Master Tabish..."; };
            
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                outputArea.innerText = "You: " + transcript;
                await fetchIntelligence(transcript);
            };
            recognition.start();
        }
    </script>
</body>
</html>
