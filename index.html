<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0 - Voice Wake</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 10px; text-align: center; border-bottom: 2px solid #00ff00; background: #000; box-shadow: 0 0 15px #00ff00; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .message { padding: 12px; border-radius: 10px; max-width: 80%; font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #004400; color: white; border: 1px solid #00ff00; }
        .jarvis-msg { align-self: flex-start; background: #111; border-left: 4px solid #00ffff; color: #00ffff; }
        .footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; text-align: center; }
        #status { font-size: 12px; color: #00ffff; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; max-width: 600px; margin: auto; width: 100%; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #00ff00; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body onclick="initVoiceSystem()">

<div class="header">
    <h2 style="margin:0;">JARVIS v36.0</h2>
    <div style="font-size: 10px; color: #888;">100x KNOWLEDGE ENGINE ACTIVE [cite: 2026-03-05]</div>
</div>

<div id="chat-window">
    <div class="message jarvis-msg">SYSTEM READY. Tabish bhai, screen par kahin bhi ek click karke sensors active karein. Phir bas bolein "Hello Jarvis".</div>
</div>

<div class="footer">
    <div id="status">SENSORS: STANDBY (CLICK TO START)</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Likh kar ya bol kar baat karein..." autocomplete="off">
        <button onclick="handleChat()">SEND</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    let recognition;
    let isListening = false;

    function initVoiceSystem() {
        if (isListening) return;
        isListening = true;
        
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            recognition = new Speech();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                status.innerText = "JARVIS: ALWAYS LISTENING...";
                status.style.color = "#00ffff";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Heard:", transcript);

                // Wake word check [cite: 2026-03-02]
                if (transcript.includes("hello jarvis") || transcript.includes("jarvis")) {
                    processInput(transcript);
                }
            };

            recognition.onerror = () => { recognition.start(); };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
    }

    function processInput(input) {
        addMessage(input, 'user');
        let reply = "Main apne 100x engine se research kar raha hoon.";

        if (input.includes("mission")) reply = "Humara mission aapko 19-20 saal ki umar mein billionaire banana hai. [cite: 2026-03-03]";
        if (input.includes("history") || input.includes("itihas")) reply = "Mere paas 1000 saal purani history ka access hai. [cite: 2026-03-02]";
        if (input.includes("google")) {
            reply = "Google khol raha hoon, Tabish bhai.";
            window.open("https://www.google.com", "_blank");
        }

        setTimeout(() => {
            addMessage(reply, 'jarvis');
            speak(reply);
        }, 500);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('userInput');
        if(input.value) { processInput(input.value); input.value = ''; }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
