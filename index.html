<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v39.0 - Dual Master</title>
    <style>
        body { background-color: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 10px; text-align: center; border-bottom: 2px solid #00ff88; background: #000; box-shadow: 0 0 15px #00ff88; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #004433; color: #fff; border: 1px solid #00ff88; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 5px solid #00ff88; color: #00ff88; }
        .footer { padding: 15px; background: #000; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 2px solid #00ff88; color: white; padding: 10px; border-radius: 8px; outline: none; }
        button { background: #00ff88; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { font-size: 10px; color: #888; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body onclick="initJarvis()">

    <div class="header">
        <h3 style="margin:0;">JARVIS v39.0</h3>
        <div style="font-size: 9px; color: #888;">DUAL MODE: VOICE + CHAT [cite: 2026-03-02]</div>
    </div>

    <div id="chat-window">
        <div class="message jarvis-msg">Main Standby par hoon. "Hello Jarvis" kahein ya niche message likhein.</div>
    </div>

    <div class="footer">
        <div id="status">SENSORS: OFF (CLICK SCREEN TO START)</div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Yahan likhein..." autocomplete="off">
            <button onclick="manualChat()">SEND</button>
        </div>
    </div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    let recognition;
    let isSpeaking = false;
    let engineStarted = false;

    function initJarvis() {
        if (engineStarted) return;
        engineStarted = true;
        setupMic();
    }

    function setupMic() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;

        recognition = new Speech();
        recognition.continuous = true;
        recognition.lang = 'hi-IN';
        recognition.interimResults = true; // --- TEZI SE SUNNE KE LIYE ---

        recognition.onstart = () => { status.innerText = "LISTENING FOR 'HELLO JARVIS'..."; };
        
        recognition.onresult = (event) => {
            if (isSpeaking) return;
            let text = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                text += event.results[i][0].transcript;
            }
            text = text.toLowerCase().trim();
            
            // --- WAKE WORD DETECTION ---
            if (text.includes("hello jarvis") || text.includes("हेलो जार्विस")) {
                let actualCommand = text.split(/hello jarvis|हेलो जार्विस/)[1]?.trim();
                if (actualCommand && actualCommand.length > 1) {
                    process(actualCommand);
                    recognition.stop(); // Stop to avoid double processing
                }
            }
        };

        recognition.onend = () => { if (!isSpeaking) recognition.start(); };
        recognition.start();
    }

    function process(input) {
        addMessage(input, 'user');
        let reply = "Processing with 100x Engine... [cite: 2026-03-05]";

        if (input.includes("billionaire") || input.includes("mission")) {
            reply = "Billionaire Target: 19-20 saal ki umar tak. Hum taiyar hain! [cite: 2026-03-03]";
        } else if (input.includes("history") || input.includes("itihas")) {
            reply = "1000 saal ki history mere database mein load hai. [cite: 2026-03-02]";
        } else if (input.includes("hello")) {
            reply = "Aadaab Tabish bhai! [cite: 2026-03-02]";
        }

        setTimeout(() => {
            addMessage(reply, 'jarvis');
            speak(reply);
        }, 500);
    }

    function speak(text) {
        isSpeaking = true;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.onend = () => {
            isSpeaking = false;
            status.innerText = "LISTENING FOR 'HELLO JARVIS'...";
        };
        window.speechSynthesis.speak(utterance);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function manualChat() {
        const input = document.getElementById('userInput');
        if (input.value) {
            process(input.value);
            input.value = '';
        }
    }
</script>
</body>
</html>
