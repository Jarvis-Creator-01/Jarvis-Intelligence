<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .orb-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .jarvis-orb { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, #00ffff 0%, #008080 50%, #000 100%); box-shadow: 0 0 50px #00ffff; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        .status-text { position: absolute; bottom: 20px; font-size: 14px; color: #00ffff; letter-spacing: 2px; }
        .chat-container { height: 150px; background: #111; padding: 15px; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .chat-input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 5px; outline: none; width: 90%; margin: 0 auto; }
        .vision-tag { font-size: 10px; color: #555; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 3px;">JARVIS v36.0</h2>
        <div style="font-size: 10px; color: #888;">100x KNOWLEDGE SYNCED [cite: 2026-03-05]</div>
    </div>

    <div class="orb-container">
        <div class="jarvis-orb" id="jarvisOrb"></div>
        <div class="status-text" id="statusText">SAY "HELLO JARVIS" TO START</div>
    </div>

    <div class="chat-container">
        <input type="text" class="chat-input" placeholder="Chat with Jarvis..." id="userInput">
        <div class="vision-tag">Target: Youngest Billionaire (19-20) [cite: 2026-03-03]</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
