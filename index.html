<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0 - Universal Hybrid</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #050505; color: #00ff00; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; background: #000; box-shadow: 0 0 15px #00ff00; flex-shrink: 0; }
        
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease; border: 1px solid transparent; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-msg { align-self: flex-end; background: #004d00; color: #fff; border-color: #00ff00; border-bottom-right-radius: 2px; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #00ffff; color: #00ffff; border-bottom-left-radius: 2px; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
        
        .footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; flex-shrink: 0; }
        #status { font-size: 11px; color: #00ffff; text-align: center; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        
        .input-group { display: flex; gap: 10px; max-width: 800px; margin: auto; width: 100%; }
        input { flex-grow: 1; background: #000; border: 2px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 10px; outline: none; font-size: 16px; box-shadow: inset 0 0 5px #00ff00; }
        
        button { background: #00ff00; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; font-size: 14px; }
        button:active { transform: scale(0.95); box-shadow: 0 0 15px #00ff00; }
    </style>
</head>
<body onclick="startEngine()">

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px;">JARVIS v36.0</h2>
    <div style="font-size: 10px; color: #888;">TARGET: YOUNGEST BILLIONAIRE [cite: 2026-03-03]</div>
</div>

<div id="chat-window">
    <div class="message jarvis-msg">SYSTEM ONLINE. Tabish bhai, screen par CLICK karke sensors active karein. Ab aap LIKH kar bhi baat kar sakte hain aur "Hello Jarvis" BOL kar bhi.</div>
</div>

<div class="footer">
    <div id="status">SENSORS: STANDBY (CLICK TO WAKE)</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Type here or say 'Hello Jarvis'..." autocomplete="off">
        <button onclick="handleManualChat()">SEND</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    const userInput = document.getElementById('userInput');
    let recognition;
    let isActive = false;

    function startEngine() {
        if (isActive) return;
        isActive = true;
        
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            recognition = new Speech();
            recognition.continuous = true;
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                status.innerText = "SENSORS: ACTIVE (ALWAYS LISTENING)";
                status.style.color = "#00ffff";
            };

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                // Wake word check [cite: 2026-03-02]
                if (text.includes("hello jarvis") || text.includes("jarvis")) {
                    processInput(text);
                }
            };

            recognition.onerror = () => { recognition.start(); };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
    }

    function processInput(input) {
        addMessage(input, 'user');
        let reply = "Processing with 100x engine... [cite: 2026-03-05]";

        if (input.includes("mission")) reply = "Humara mission aapko 19-20 saal mein billionaire banana hai. [cite: 2026-03-03]";
        if (input.includes("history") || input.includes("itihas")) reply = "Mere paas 1000 saal purani history ka data hai. [cite: 2026-03-02]";
        
        setTimeout(() => {
            addMessage(reply, 'jarvis');
            speak(reply);
        }, 500);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleManualChat() {
        const text = userInput.value.trim();
        if(text) { processInput(text); userInput.value = ''; }
    }

    // Enter key support for chat
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleManualChat();
    });

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
