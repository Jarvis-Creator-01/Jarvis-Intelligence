<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v7.5 - Internet Master</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .jarvis-box { border: 2px solid #0f0; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px #0f0; display: inline-block; width: 95%; max-width: 600px; margin-top: 20px; }
        #output { margin-top: 20px; font-size: 1.1em; min-height: 280px; color: #fff; text-align: left; padding: 15px; border-top: 1px solid #333; line-height: 1.6; overflow-y: auto; max-height: 450px; }
        button { background: #0f0; color: #000; border: none; padding: 15px 35px; font-size: 1.1em; cursor: pointer; border-radius: 10px; font-weight: bold; box-shadow: 0 0 15px #0f0; margin-top: 20px; }
        .status { color: #0f0; font-size: 0.8em; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <div class="status" id="st">System: Online</div>
        <h1 style="letter-spacing: 3px;">JARVIS v7.5</h1>
        <div id="output">Jarvis: Taiyar hoon Sir. Duniya ki har jankari ab mere kabze mein hai.</div>
        <button onclick="startJarvis()">MASTER SCAN</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const st = document.getElementById('st');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
            st.innerText = "System: Standby";
        }

        async function deepSearch(query) {
            st.innerText = "Deep Scanning Internet...";
            try {
                // Pehle DuckDuckGo se pucho (Ye har chiz ka jawab deta hai)
                let response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                let data = await response.json();
                
                if (data.AbstractText) {
                    return data.AbstractText;
                } else {
                    // Agar wahan nahi mila toh Wikipedia backup
                    let resWiki = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                    let dataWiki = await resWiki.json();
                    return dataWiki.extract ? dataWiki.extract : "Sir, is topic ki jankari bohot secret hai, lekin mere 1000 saal purane experience ke mutabik ye jald update hogi.";
                }
            } catch (e) {
                return "Connectivity issue, Sir.";
            }
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onstart = () => { st.innerText = "Listening..."; };
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                output.innerText = "You: " + transcript;
                let result = await deepSearch(transcript);
                speak(result);
            };
            recognition.start();
        }
    </script>
</body>
</html>
