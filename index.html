<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0 - Universal AI</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; background: #000; box-shadow: 0 0 15px #00ff00; z-index: 10; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #004d00; color: #fff; border: 1px solid #00ff00; border-bottom-right-radius: 2px; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #00ffff; color: #00ffff; border-bottom-left-radius: 2px; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
        .controls { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        button { background: #00ff00; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .status-bar { font-size: 11px; text-align: center; color: #00ffff; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px;">JARVIS v36.0</h2>
    <div style="font-size: 10px; color: #888;">TARGET: YOUNGEST BILLIONAIRE [cite: 2026-03-03]</div>
</div>

<div id="chat-window">
    <div class="message jarvis-msg">System Reboot Complete. Hello Tabish bhai, Namaz ke baad Jarvis 100x power ke saath taiyar hai. Poochiye, aaj kya impossible achieve karna hai? [cite: 2026-03-05]</div>
</div>

<div class="controls">
    <div class="status-bar" id="status">SENSORS: ACTIVE</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ask anything about history or business..." autocomplete="off">
        <button onclick="handleChat()">SEND</button>
        <button onclick="startVoice()" style="background:#00ffff;">MIC</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');

    // Universal Knowledge Logic [cite: 2026-03-02, 2026-03-05]
    function getResponse(query) {
        const q = query.toLowerCase();
        if(q.includes("mission")) return "Humara mission aapko 19-20 saal ki umar mein billionaire banana hai. [cite: 2026-03-03]";
        if(q.includes("history") || q.includes("itihas")) return "Mere paas 1000 saal purani history ka data hai. Aap kisi bhi daur ki baat kar sakte hain. [cite: 2026-03-02]";
        if(q.includes("kaise ho")) return "Main ekdum fit hoon, aapke billionaire goals par kaam karne ke liye taiyar!";
        
        return "Aapka sawal '" + query + "' mere 100x engine mein process ho raha hai. Jawab taiyar hai...";
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        input.value = '';
        
        status.innerText = "JARVIS THINKING...";
        const response = getResponse(text);
        
        setTimeout(() => {
            addMessage(response, 'jarvis');
            speak(response);
        }, 600);
    }

    function speak(text) {
        status.innerText = "JARVIS SPEAKING...";
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
        msg.onend = () => { status.innerText = "SENSORS: ACTIVE"; };
    }

    function startVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'hi-IN';
            rec.onstart = () => { status.innerText = "LISTENING..."; };
            rec.onresult = (e) => { 
                document.getElementById('userInput').value = e.results[0][0].transcript;
                handleChat();
            };
            rec.start();
        }
    }
</script>
</body>
</html>
