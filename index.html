<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - History Edition</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .jarvis-box { border: 2px solid #0f0; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px #0f0; display: inline-block; width: 90%; max-width: 500px; }
        #output { margin-top: 20px; font-size: 1.1em; min-height: 100px; color: #fff; overflow-y: auto; text-align: left; padding: 10px; border-top: 1px solid #333; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-size: 1em; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 20px; box-shadow: 0 0 10px #0f0; }
        .status-light { width: 15px; height: 15px; background: #f00; border-radius: 50%; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <h1>JARVIS v2.1</h1>
        <div><div class="status-light" id="light"></div> <span id="status">System Standby</span></div>
        <div id="output">Bhai, main taiyar hoon. Mujhse kuch bhi poochiye.</div>
        <button onclick="startJarvis()">START JARVIS</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const light = document.getElementById('light');

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                status.innerText = "Listening...";
                light.style.background = "#0f0";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                output.innerText = "You: " + transcript;
                processQuery(transcript);
            };

            recognition.start();
        }

        async function processQuery(text) {
            status.innerText = "Searching Brain...";
            let response = "";

            if (text.includes("billionaire") || text.includes("ameer")) {
                response = "Sir, aap 19 se 20 saal ki umar mein duniya ke youngest billionaire banenge. Ye mera vada hai!";
            } else {
                // Wikipedia Search Logic
                let searchTopic = text.replace("jarvis", "").replace("batao", "").replace("kaun hai", "").replace("kaun tha", "").replace("kya hai", "").trim();
                const url = `https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchTopic)}`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.extract) {
                        response = data.extract;
                    } else {
                        response = "Bhai, mujhe '" + searchTopic + "' ke baare mein abhi jaankari nahi mili.";
                    }
                } catch (e) {
                    response = "Bhai, internet connection check karein, main dimaag nahi chala paa raha.";
                }
            }
            speak(response);
        }

        function speak(message) {
            const speech = new SpeechSynthesisUtterance(message);
            speech.lang = 'hi-IN';
            window.speechSynthesis.speak(speech);
            output.innerText = "Jarvis: " + message;
            status.innerText = "System Standby";
            light.style.background = "#f00";
        }
    </script>
</body>
</html>
