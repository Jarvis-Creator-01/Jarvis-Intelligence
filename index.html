<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v11.0 - Direct Intelligence</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .jarvis-box { border: 2px solid #0f0; padding: 30px; border-radius: 25px; box-shadow: 0 0 50px #0f0; display: inline-block; width: 95%; max-width: 600px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.1em; min-height: 380px; color: #fff; text-align: left; padding: 20px; border-top: 2px solid #0f0; line-height: 1.8; overflow-y: auto; max-height: 600px; border-radius: 15px; background: rgba(0,255,0,0.05); }
        .status { font-size: 0.8em; color: #0f0; margin-bottom: 15px; font-weight: bold; }
        button { background: #0f0; color: #000; border: none; padding: 20px 50px; font-size: 1.3em; cursor: pointer; border-radius: 50px; font-weight: bold; box-shadow: 0 0 25px #0f0; margin-top: 25px; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <h1 style="text-shadow: 0 0 15px #0f0;">JARVIS v11.0</h1>
        <div class="status" id="st">BRAIN: READY | DATA: UNLOCKED</div>
        <div id="output">Jarvis: Sir, maine saare systems bypass kar diye hain. Ab main seedha jawab dunga.</div>
        <button onclick="startJarvis()">EXECUTE SEARCH</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const st = document.getElementById('st');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
            st.innerText = "BRAIN: STANDBY";
        }

        async function fetchDirectKnowledge(query) {
            st.innerText = "BRAIN: FORCING DATA FETCH...";
            let cleanedQuery = query.toLowerCase();
            
            // Intelligence Mapping for Billionaire Topics
            if(cleanedQuery.includes("stock") || cleanedQuery.includes("market")) cleanedQuery = "Stock_market";
            if(cleanedQuery.includes("billionaire") || cleanedQuery.includes("ameer")) cleanedQuery = "Billionaire";
            if(cleanedQuery.includes("weapon") || cleanedQuery.includes("hathiyar")) cleanedQuery = "Weapon";
            if(cleanedQuery.includes("skill")) cleanedQuery = "Skill";

            try {
                // Try fetching directly from the most reliable English source
                let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cleanedQuery)}`);
                let data = await res.json();
                
                if (data.extract) {
                    return data.extract;
                } else {
                    return "Sir, " + query + " ke bare mein info mere local records se fetch ho rahi hai. Ye ek aisi technique hai jo aapke 19-20 saal mein billionaire banne ke sapne ko poora karegi.";
                }
            } catch (e) {
                return "Critical Error: Cannot reach Global Database.";
            }
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onstart = () => { st.innerText = "BRAIN: LISTENING..."; };
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                output.innerText = "You: " + transcript;
                let result = await fetchDirectKnowledge(transcript);
                speak(result);
            };
            recognition.start();
        }
    </script>
</body>
</html>
