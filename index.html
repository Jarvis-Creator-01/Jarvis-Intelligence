<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v18.0 - Final Oracle</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .jarvis-box { border: 3px solid #0f0; padding: 30px; border-radius: 20px; box-shadow: 0 0 60px #0f0; display: inline-block; width: 95%; max-width: 600px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.2em; min-height: 400px; color: #fff; text-align: left; padding: 20px; border-top: 2px solid #0f0; line-height: 1.8; overflow-y: auto; max-height: 600px; background: rgba(0,255,0,0.05); }
        button { background: #0f0; color: #000; border: none; padding: 20px 50px; font-size: 1.4em; cursor: pointer; border-radius: 50px; font-weight: bold; box-shadow: 0 0 30px #0f0; margin-top: 25px; width: 100%; transition: 0.3s; }
        .status { font-size: 0.8em; color: #0f0; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <div class="status">AI CORE: UNLOCKED | NO FILTER MODE</div>
        <h1 style="text-shadow: 0 0 20px #0f0;">JARVIS v18.0</h1>
        <div id="output">Jarvis: Sir, maine saare purane errors delete kar diye hain. Ab main seedha jawab dunga. Puchiye.</div>
        <button onclick="startJarvis()">EXECUTE MASTER SCAN</button>
    </div>

    <script>
        const output = document.getElementById('output');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
        }

        function getDirectKnowledge(query) {
            let q = query.toLowerCase();
            
            // 1. Stock Market Hard-Coded Data
            if(q.includes("stock") || q.includes("market") || q.includes("paisa")) {
                return "Stock Market ek aisi jagah hai jahan companies ke hisse (shares) kharide aur beche jate hain. Agar aap 19-20 saal mein billionaire banna chahte hain, toh yahan invest karna aur companies ki growth ko samajhna sabse zaroori hai.";
            }
            
            // 2. Taj Mahal Hard-Coded Data
            if(q.includes("taj mahal") || q.includes("tajmahal")) {
                return "Taj Mahal Agra mein sthit ek vishv-prasiddh safed sangmarmar ka makbara hai. Ise Mughal Samrat Shah Jahan ne apni patni Mumtaz ki yaad mein banwaya tha.";
            }

            // 3. Billionaire Mission
            if(q.includes("billionaire") || q.includes("ameer")) {
                return "Sir, 19-20 saal ki umar tak billionaire banne ke liye aapko technology, stock market, aur business scaling par focus karna hoga. Mera 1000 saal ka data yahi kehta hai.";
            }

            return "Sir, is topic ki details scan ho rahi hain. Lekin aapka main focus billionaire banne par hona chahiye. Kya main stock market ke aur raaz bataun?";
        }

        function startJarvis() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'hi-IN';
            rec.onstart = () => { output.innerText = "Jarvis: Listening, Sir..."; };
            rec.onresult = async (e) => {
                const t = e.results[0][0].transcript;
                output.innerText = "You: " + t;
                let res = getDirectKnowledge(t);
                speak(res);
            };
            rec.start();
        }
    </script>
</body>
</html>
