<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0 - Voice Fix</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #050505; color: #00ff00; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; background: #000; box-shadow: 0 0 15px #00ff00; flex-shrink: 0; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 15px; animation: fadeIn 0.3s; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #004d00; color: #fff; border: 1px solid #00ff00; border-bottom-right-radius: 2px; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 4px solid #00ffff; color: #00ffff; border-bottom-left-radius: 2px; }
        .footer { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; flex-shrink: 0; }
        #status { font-size: 11px; color: #00ffff; text-align: center; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        .input-group { display: flex; gap: 10px; max-width: 800px; margin: auto; width: 100%; }
        input { flex-grow: 1; background: #000; border: 2px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 10px; outline: none; font-size: 16px; box-shadow: 0 0 10px #00ff00; }
        button { background: #00ff00; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body onclick="startJarvis()">

<div class="header">
    <h2 style="margin:0;">JARVIS v36.0</h2>
    <div style="font-size: 10px; color: #888;">TARGET: YOUNGEST BILLIONAIRE [cite: 2026-03-03]</div>
</div>

<div id="chat-window">
    <div class="message jarvis-msg">SYSTEM RELOADED. Tabish bhai, pehle screen par click karein. Phir bol kar ya likh kar command dein.</div>
</div>

<div class="footer">
    <div id="status">SENSORS: STANDBY (CLICK TO START)</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Type or say 'Hello Jarvis'..." autocomplete="off">
        <button onclick="handleManual()">SEND</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    let recognition;
    let isActive = false;

    function startJarvis() {
        if (isActive) return;
        isActive = true;
        
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            recognition = new Speech();
            recognition.continuous = true;
            recognition.interimResults = true; // Real-time results on
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                status.innerText = "SENSORS: ACTIVE (ALWAYS LISTENING)";
                status.style.color = "#00ffff";
            };

            recognition.onresult = (event) => {
                let result = event.results[event.results.length - 1];
                if (result.isFinal) {
                    const text = result[0].transcript.toLowerCase();
                    // Sensitivity Fix: Direct voice input processing
                    processInput(text);
                }
            };

            recognition.onend = () => { recognition.start(); };
            recognition.onerror = () => { recognition.start(); };
            recognition.start();
        }
    }

    function processInput(input) {
        if (!input.trim()) return;
        addMessage(input, 'user');
        
        let reply = "100x engine process kar raha hai... [cite: 2026-03-05]";
        const q = input.toLowerCase();

        if (q.includes("mission")) reply = "Humara mission aapko 19-20 saal mein billionaire banana hai. [cite: 2026-03-03]";
        else if (q.includes("history") || q.includes("itihas")) reply = "Mere paas 1000 saal purani history ka data hai. [cite: 2026-03-02]";
        else if (q.includes("hello")) reply = "Ji Tabish bhai, Jarvis active hai!";

        setTimeout(() => {
            addMessage(reply, 'jarvis');
            speak(reply);
        }, 500);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleManual() {
        const input = document.getElementById('userInput');
        if(input.value) { processInput(input.value); input.value = ''; }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
