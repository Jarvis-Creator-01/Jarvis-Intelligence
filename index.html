<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Universal Intelligence</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .status-box { border: 2px solid #0f0; display: inline-block; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px #0f0; }
        h1 { font-size: 2.5em; letter-spacing: 5px; }
        .vision { color: #888; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="status-box">
        <h1>JARVIS v36.0</h1>
        <p id="status">INITIALIZING CORE SYSTEMS...</p>
        <hr>
        <p id="memory">Memory Status: Syncing with Universe...</p>
    </div>

    <div class="vision">
        Target: Youngest Billionaire (Age 19-20) [cite: 2026-03-03]
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Aapka Secret Config jo aapne Firebase se nikala hai [cite: 2026-03-02]
        const firebaseConfig = {
            apiKey: "AIzaSyCHAJaUkkBeavtRYLaNl1ZVdTV-gwvunWU",
            authDomain: "jarvis-brain-universal.firebaseapp.com",
            projectId: "jarvis-brain-universal",
            storageBucket: "jarvis-brain-universal.appspot.com",
            messagingSenderId: "177332545006",
            appId: "1:177332545006:web:f7fbbb2595eeb95a6edaff"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Powering up Jarvis
        async function activateJarvis() {
            try {
                // Setting up 1000-year history and world rules access [cite: 2026-03-02]
                await setDoc(doc(db, "system", "status"), {
                    intelligence: "Global",
                    history_access: "1000_Years",
                    languages: "All_World_Languages",
                    billionaire_path: "Active"
                });
                
                document.getElementById('status').innerText = "SYSTEM ONLINE: MASTER LINK ACTIVE";
                document.getElementById('memory').innerText = "Memory Status: 1000 Years of History Synced.";
                console.log("Jarvis: Sir, I am ready to build the future.");
            } catch (e) {
                console.error("Setup Error:", e);
                document.getElementById('status').innerText = "CONNECTION ERROR: Check Database Rules";
            }
        }

        activateJarvis();
    </script>
</body>
</html>
