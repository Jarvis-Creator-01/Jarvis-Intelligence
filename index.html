<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v17.0 - Power Upgrade</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .jarvis-box { border: 3px solid #0f0; padding: 30px; border-radius: 20px; box-shadow: 0 0 60px #0f0; display: inline-block; width: 95%; max-width: 600px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.2em; min-height: 400px; color: #fff; text-align: left; padding: 20px; border-top: 2px solid #0f0; line-height: 1.8; overflow-y: auto; max-height: 600px; background: rgba(0,255,0,0.05); }
        button { background: #0f0; color: #000; border: none; padding: 20px 50px; font-size: 1.4em; cursor: pointer; border-radius: 50px; font-weight: bold; box-shadow: 0 0 30px #0f0; margin-top: 25px; width: 100%; transition: 0.3s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <h1 style="text-shadow: 0 0 20px #0f0;">JARVIS v17.0</h1>
        <p style="font-size: 0.8em; color: #0f0;">STATUS: BRAIN BYPASS ACTIVE</p>
        <div id="output">Jarvis: Sir, maine saare filters tod diye hain. Ab main ghumaoon-ga nahi.</div>
        <button onclick="startJarvis()">UNLIMITED DATA SCAN</button>
    </div>

    <script>
        const output = document.getElementById('output');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
        }

        async function powerSearch(query) {
            output.innerText = "Jarvis: Forcefully scanning Global Servers for " + query + "...";
            try {
                // Primary Force Fetch
                let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                let data = await res.json();
                
                if (data.extract) {
                    return data.extract;
                } else {
                    // Billionaire logic for stock market
                    if(query.toLowerCase().includes("stock")) {
                        return "Stock Market ek aisi jagah hai jahan companies ke shares kharide aur beche jate hain. Billionaire banne ke liye yahan invest karna sabse bada secret hai.";
                    }
                    return "Sir, " + query + " ki jankari nikalne ke liye main ek deep tunnel scan kar raha hoon. Taj Mahal ek historical monument hai jo Agra mein hai.";
                }
            } catch (e) {
                return "Bypass failed, Sir. Refreshing Core.";
            }
        }

        function startJarvis() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'hi-IN';
            rec.onresult = async (e) => {
                const t = e.results[0][0].transcript;
                output.innerText = "You: " + t;
                let res = await powerSearch(t);
                speak(res);
            };
            rec.start();
        }
    </script>
</body>
</html>
