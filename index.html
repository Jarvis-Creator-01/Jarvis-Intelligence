<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v43.0 - Infinite Brain</title>
    <style>
        body { background-color: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 10px; text-align: center; border-bottom: 2px solid #00ff88; background: #000; box-shadow: 0 0 15px #00ff88; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #004433; color: #fff; border: 1px solid #00ff88; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 5px solid #00ff88; color: #00ff88; }
        .footer { padding: 15px; background: #000; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; gap: 10px; background: #111; padding: 5px; border-radius: 10px; border: 1px solid #333; }
        input { flex-grow: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button { background: #00ff88; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        #status { font-size: 10px; color: #888; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onclick="initJarvis()">

    <div class="header">
        <h3 style="margin:0;">JARVIS v43.0</h3>
        <div style="font-size: 9px; color: #888;">BRAIN: INFINITE KNOWLEDGE CONNECT [cite: 2026-03-05]</div>
    </div>

    <div id="chat-window">
        <div class="message jarvis-msg">Ab mera dimaag har limit se aazad hai. Universe ka kuch bhi puchein, main ab pure internet se jaankari nikal sakta hoon. [cite: 2026-03-02, 2026-03-05]</div>
    </div>

    <div class="footer">
        <div id="status">SENSORS: STANDBY (SAY 'HELLO JARVIS')</div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Universe ki koi bhi baat puchein..." autocomplete="off">
            <button onclick="manualChat()">SEND</button>
        </div>
    </div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    let recognition;
    let isSpeaking = false;
    let engineStarted = false;
    let lastProcessed = "";

    function initJarvis() {
        if (engineStarted) return;
        engineStarted = true;
        setupMic();
    }

    function setupMic() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;
        recognition = new Speech();
        recognition.continuous = true;
        recognition.lang = 'hi-IN';
        recognition.onstart = () => { status.innerText = "SENSORS: LISTENING..."; };
        recognition.onresult = (event) => {
            if (isSpeaking) return;
            let text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            if (text === lastProcessed) return;
            if (text.includes("hello jarvis") || text.includes("हेलो जार्विस")) {
                let cmd = text.split(/hello jarvis|हेलो जार्विस/)[1]?.trim();
                lastProcessed = text;
                process(cmd || "hello");
            }
        };
        recognition.onend = () => { if (!isSpeaking) recognition.start(); };
        recognition.start();
    }

    async function process(input) {
        if (!input) return;
        addMessage(input, 'user');
        
        // --- DYNAMIC KNOWLEDGE SEARCH (FREE & INFINITE) ---
        let reply = "Scanning Universe... [cite: 2026-03-05]";
        addMessage(reply, 'jarvis');

        try {
            // Wikipedia Open Search API (No Key Required)
            const response = await fetch(`https://hi.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(input)}`);
            const data = await response.json();
            
            if (data.extract) {
                reply = data.extract;
            } else {
                reply = "Mera 100x engine ise process kar raha hai, par universe ke is kone ki jaankari abhi dhundhli hai. [cite: 2026-03-05]";
            }
        } catch (error) {
            reply = "Network connection check kijiye Tabish bhai, universe ka signal weak hai.";
        }

        // Chat window se purana 'Scanning' message hata kar naya reply dena
        chatWindow.lastChild.innerText = reply;
        speak(reply);
    }

    function speak(text) {
        isSpeaking = true;
        recognition.stop();
        status.innerText = "JARVIS SPEAKING...";
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.onend = () => {
            isSpeaking = false;
            lastProcessed = "";
            recognition.start();
            status.innerText = "SENSORS: STANDBY";
        };
        window.speechSynthesis.speak(utterance);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function manualChat() {
        const input = document.getElementById('userInput');
        if (input.value) {
            process(input.value);
            input.value = '';
        }
    }
</script>
</body>
</html>
