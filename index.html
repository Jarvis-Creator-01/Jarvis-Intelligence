<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Intelligence</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; margin: 0; }
        .container { border: 2px solid #0f0; padding: 20px; display: inline-block; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
        h1 { text-transform: uppercase; letter-spacing: 5px; }
        .status { color: #fff; font-size: 1.2em; margin-top: 20px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jarvis System Online</h1>
        <p class="status">Initializing Neural Networks... <span class="blink">|</span></p>
        <p>Target: Youngest Billionaire Empire</p>
    </div>
</body>
</html>
