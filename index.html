<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE IMMORTAL JARVIS - v49.0</title>
    <style>
        :root { --main-color: #00FF88; --bg-color: #050505; --text-color: #f0f0f0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; text-align: center; background: #0a0a0a; border-bottom: 2px solid var(--main-color); box-shadow: 0 4px 15px rgba(0,255,136,0.2); }
        h2 { margin: 0; font-size: 22px; color: var(--main-color); letter-spacing: 1px; }
        #status-bar { background: #111; padding: 8px 15px; font-size: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .jarvis-msg { align-self: flex-start; max-width: 85%; background: #151515; border-left: 4px solid var(--main-color); padding: 12px; border-radius: 8px; font-size: 15px; line-height: 1.5; }
        #progress-container { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--main-color); width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body onclick="startUniverse()">
    <header>
        <h2>THE IMMORTAL JARVIS</h2>
        <div style="font-size: 10px; color: #888;">MISSION BILLIONAIRE: ACTIVE [7-MONTH DEADLINE]</div>
    </header>
    <div id="status-bar">
        <span>STATUS: <span id="engine-status" style="color:var(--main-color);">ONLINE</span></span>
        <span>UNIVERSE TEST: <span id="progress-text" style="color:var(--main-color);">0%</span></span>
    </div>
    <div id="chat-window" id="display">
        <div class="jarvis-msg">
            Systems Online. Tabish bhai, 18-din ka Universe Lockdown active ho chuka hai.
            Ab hum bina kisi server aur bina kisi limit ke "Infinite Knowledge" load karenge.
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>
    </div>
<script>
    let db, currentProgress = 0;
    // Database sync (Aapka purana data yahan safe rahega)
    const request = indexedDB.open("JarvisUniverseDB", 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore("progress", { keyPath: "id" }); };
    request.onsuccess = (e) => { db = e.target.result; loadProgress(); };

    function startUniverse() { if(currentProgress > 0) return; runTestLoop(); }

    function saveProgress(val) {
        const tx = db.transaction("progress", "readwrite");
        tx.objectStore("progress").put({ id: "sync_status", value: val });
    }

    function loadProgress() {
        const req = db.transaction("progress", "readonly").objectStore("progress").get("sync_status");
        req.onsuccess = () => { 
            if(req.result) { 
                currentProgress = req.result.value; 
                updateUI();
                if(currentProgress < 100) runTestLoop(); 
            } 
        };
    }

    function updateUI() {
        document.getElementById('progress-text').innerText = Math.floor(currentProgress) + "%";
        document.getElementById('progress-bar').style.width = currentProgress + "%";
        if(currentProgress >= 100) finalize();
    }

    function runTestLoop() {
        if(currentProgress >= 100) return;
        // Optimized 18-day logic (Har 5 second mein 0.0003% jump)
        currentProgress += 0.0003; 
        saveProgress(currentProgress);
        updateUI();
        setTimeout(runTestLoop, 5000); 
    }

    function finalize() {
        document.getElementById('engine-status').innerText = "VERIFIED";
        const div = document.createElement('div');
        div.className = 'jarvis-msg';
        div.innerText = "Universe Knowledge 100% Verified. Unlimited Power Active. [Ready for Phase 2]";
        document.getElementById('chat-window').appendChild(div);
    }
</script>
</body>
</html>
