<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v36.0</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        .orb-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .jarvis-orb { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, #00ffff 0%, #000 100%); box-shadow: 0 0 30px #00ffff; margin-bottom: 20px; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 20px #00ffff; } to { transform: scale(1.1); box-shadow: 0 0 60px #00ffff; } }
        .status { color: #00ffff; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-activate { background: #00ff00; color: black; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .chat-section { background: #111; padding: 20px; border-top: 1px solid #333; }
        .input-box { display: flex; gap: 10px; max-width: 600px; margin: auto; }
        .chat-input { flex-grow: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; border-radius: 8px; }
        .send-btn { background: #00ff00; border: none; padding: 0 25px; border-radius: 8px; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">JARVIS v36.0</h3>
        <div style="font-size: 10px; color: #555;">KNOWLEDGE: 100x ChatGPT [cite: 2026-03-05]</div>
    </div>

    <div class="orb-container">
        <div class="jarvis-orb" id="orb"></div>
        <div class="status" id="status">SYSTEM READY</div>
        <button class="btn-activate" onclick="startJarvis()">ACTIVATE JARVIS</button>
    </div>

    <div class="chat-section">
        <div class="input-box">
            <input type="text" id="userInput" class="chat-input" placeholder="Mission ya History puche..." autocomplete="off">
            <button class="send-btn" onclick="handleChat()">SEND</button>
        </div>
    </div>

    <script>
        // Memory [cite: 2026-03-02]
        const memory = {
            "mission": "Humara mission aapko 19 se 20 saal ki umar mein billionaire banana hai. [cite: 2026-03-03]",
            "history": "Mere paas 1000 saal purani history ka access hai. [cite: 2026-03-02]",
            "hello": "Hello Tabish bhai, Jarvis online hai."
        };

        function startJarvis() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                const rec = new Speech();
                rec.lang = 'hi-IN';
                rec.onstart = () => { document.getElementById('status').innerText = "LISTENING..."; };
                rec.onresult = (e) => { process(e.results[0][0].transcript.toLowerCase()); };
                rec.start();
            }
        }

        function handleChat() {
            const val = document.getElementById('userInput').value.toLowerCase();
            if(val) { process(val); document.getElementById('userInput').value = ''; }
        }

        function process(input) {
            let reply = "Main is par 100x engine se research kar raha hoon.";
            if (input.includes("miss")) reply = memory.mission;
            else if (input.includes("hist") || input.includes("itihas")) reply = memory.history;
            else if (input.includes("hello")) reply = memory.hello;

            say(reply);
        }

        function say(text) {
            document.getElementById('status').innerText = "SPEAKING...";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            utterance.onend = () => { document.getElementById('status').innerText = "ONLINE"; };
        }
    </script>
</body>
</html>
