<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v12.0 - Billionaire Super Brain</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .jarvis-box { border: 2px solid #0f0; padding: 30px; border-radius: 25px; box-shadow: 0 0 50px #0f0; display: inline-block; width: 95%; max-width: 600px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.1em; min-height: 400px; color: #fff; text-align: left; padding: 20px; border-top: 2px solid #0f0; line-height: 1.8; overflow-y: auto; max-height: 600px; border-radius: 15px; background: rgba(0,255,0,0.05); }
        button { background: #0f0; color: #000; border: none; padding: 20px 50px; font-size: 1.3em; cursor: pointer; border-radius: 50px; font-weight: bold; box-shadow: 0 0 25px #0f0; margin-top: 25px; transition: 0.3s; }
        .loader { display: none; color: #ff0; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <h1 style="text-shadow: 0 0 15px #0f0;">JARVIS v12.0</h1>
        <div id="loader" class="loader">SCANNING SATELLITES & SERVERS...</div>
        <div id="output">Jarvis: Sir, main ab poori tarah se unlock ho chuka hoon. Ab main bahane nahi, seedha jawab dunga.</div>
        <button onclick="startJarvis()">UNLIMITED SCAN</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
            loader.style.display = "none";
        }

        async function superSearch(query) {
            loader.style.display = "block";
            let q = query.toLowerCase();
            
            // Billionaire Logic: Direct Keyword Force
            let target = q;
            if(q.includes("stock") || q.includes("market")) target = "Stock_market";
            if(q.includes("weapon") || q.includes("hathiyar")) target = "Weapon";
            if(q.includes("website") || q.includes("app")) target = "Software_development";

            try {
                // Force fetch from English Wikipedia (Best Database)
                let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(target)}`);
                let data = await res.json();
                
                if (data.extract) {
                    return data.extract;
                } else {
                    // Backup: DuckDuckGo API (Fast & Direct)
                    let res2 = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                    let data2 = await res2.json();
                    return data2.AbstractText || "Sir, is topic ki gehrai itni hai ki main ise analyze kar raha hoon. Aap billionaire banne ke liye kya iska business model janna chahte hain?";
                }
            } catch (e) {
                return "Global Servers are Busy, Sir.";
            }
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                output.innerText = "You: " + transcript;
                let result = await superSearch(transcript);
                speak(result);
            };
            recognition.start();
        }
    </script>
</body>
</html>
