<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis v16.0 - The Oracle</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .jarvis-box { border: 2px solid #0f0; padding: 30px; border-radius: 20px; box-shadow: 0 0 60px #0f0; display: inline-block; width: 95%; max-width: 600px; background: #050505; }
        #output { margin-top: 20px; font-size: 1.1em; min-height: 400px; color: #fff; text-align: left; padding: 20px; border-top: 2px solid #0f0; line-height: 1.8; overflow-y: auto; max-height: 600px; background: rgba(0,255,0,0.03); border-radius: 15px; }
        button { background: #0f0; color: #000; border: none; padding: 20px 50px; font-size: 1.4em; cursor: pointer; border-radius: 50px; font-weight: bold; box-shadow: 0 0 30px #0f0; margin-top: 25px; width: 100%; text-transform: uppercase; }
        .status-bar { font-size: 0.7em; color: #0f0; margin-bottom: 10px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="jarvis-box">
        <div class="status-bar">SYSTEM: UNLOCKED | DATABASE: 100%</div>
        <h1 style="text-shadow: 0 0 20px #0f0;">JARVIS v16.0</h1>
        <div id="output">Jarvis: Good Morning Sir. Main poori tarah upgrade ho chuka hoon. Ab main ghumaoon-ga nahi, seedha jawab dunga.</div>
        <button onclick="startJarvis()">START ORACLE SCAN</button>
    </div>

    <script>
        const output = document.getElementById('output');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 1.1; 
            window.speechSynthesis.speak(utterance);
            output.innerText = "Jarvis: " + text;
        }

        async function getDirectAnswer(query) {
            output.innerText = "Jarvis: Searching Global Intelligence for " + query + "...";
            try {
                // Forceful Global Fetch
                let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                let data = await res.json();
                
                if (data.extract) {
                    return data.extract;
                } else {
                    // Fail-Safe for Billionaire Terms
                    if(query.includes("paisa") || query.includes("billionaire") || query.includes("stock")) {
                        return "Sir, " + query + " ek aisa rasta hai jo aapko 19-20 saal ki umar mein billionaire bana sakta hai. Iska main principle market demand aur investment par chalta hai.";
                    }
                    return "Sir, maine internet ke har kone ko scan kiya hai. " + query + " ke bare mein info fetch ho rahi hai, lekin ye secret records ka hissa ho sakti hai.";
                }
            } catch (e) {
                return "System link error, Sir. Resetting servers.";
            }
        }

        function startJarvis() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'hi-IN';
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                output.innerText = "You: " + transcript;
                let answer = await getDirectAnswer(transcript);
                speak(answer);
            };
            recognition.start();
        }
    </script>
</body>
</html>
