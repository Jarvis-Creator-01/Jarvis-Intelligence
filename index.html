<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v38.0 - Standby Mode</title>
    <style>
        body { background-color: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 10px; text-align: center; border-bottom: 2px solid #00ff88; background: #000; box-shadow: 0 0 15px #00ff88; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #004433; color: #fff; border: 1px solid #00ff88; }
        .jarvis-msg { align-self: flex-start; background: #1a1a1a; border-left: 5px solid #00ff88; color: #00ff88; }
        .footer { padding: 10px; background: #000; border-top: 1px solid #333; }
        #status { font-size: 10px; color: #888; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onclick="initJarvis()">

    <div class="header">
        <h3 style="margin:0;">JARVIS v38.0</h3>
        <div style="font-size: 9px; color: #888;">STATUS: STANDBY MODE [cite: 2026-03-02]</div>
    </div>

    <div id="chat-window">
        <div class="message jarvis-msg">Main Standby par hoon. Jab tak aap "Hello Jarvis" nahi bolenge, main kuch nahi sununga.</div>
    </div>

    <div class="footer">
        <div id="status">SENSORS: OFF (CLICK TO ENABLE)</div>
    </div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const status = document.getElementById('status');
    let recognition;
    let isSpeaking = false;
    let engineStarted = false;

    function initJarvis() {
        if (engineStarted) return;
        engineStarted = true;
        setupMic();
    }

    function setupMic() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;

        recognition = new Speech();
        recognition.continuous = true;
        recognition.lang = 'hi-IN';
        recognition.interimResults = false;

        recognition.onstart = () => { status.innerText = "SENSORS: STANDBY (WAITING FOR 'HELLO JARVIS')"; };
        
        recognition.onresult = (event) => {
            if (isSpeaking) return;
            const text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            
            // --- WAKE WORD DETECTION (SIRF HELLO JARVIS PAR CHALEGA) ---
            if (text.includes("hello jarvis") || text.includes("हेलो जार्विस")) {
                let actualCommand = text.replace("hello jarvis", "").replace("हेलो जार्विस", "").trim();
                
                if (actualCommand.length > 1) {
                    process(actualCommand);
                } else {
                    let greeting = "Aadaab Tabish bhai! Hukm kijiye."; [cite: 2026-03-02]
                    addMessage(greeting, 'jarvis');
                    speak(greeting);
                }
            }
            // Agar "Hello Jarvis" nahi hai, toh system kuch nahi karega (Silence)
        };

        recognition.onend = () => { if (!isSpeaking) recognition.start(); };
        recognition.start();
    }

    function process(input) {
        addMessage(input, 'user');
        let reply = "100x engine process kar raha hai... [cite: 2026-03-05]";

        if (input.includes("billionaire") || input.includes("mission")) {
            reply = "Target: 20 saal ki umar mein billionaire. Hamara rasta ekdam saaf hai! [cite: 2026-03-03]";
        } else if (input.includes("itihas") || input.includes("history")) {
            reply = "1000 saal ki history mere database mein hai. Hukm karein kya janna hai? [cite: 2026-03-02]";
        }

        setTimeout(() => {
            addMessage(reply, 'jarvis');
            speak(reply);
        }, 500);
    }

    function speak(text) {
        isSpeaking = true;
        recognition.stop();
        status.innerText = "JARVIS SPEAKING...";
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.onend = () => {
            isSpeaking = false;
            recognition.start();
            status.innerText = "SENSORS: STANDBY (WAITING FOR 'HELLO JARVIS')";
        };
        window.speechSynthesis.speak(utterance);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
</body>
</html>
